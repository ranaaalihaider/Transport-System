name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master # Triggers on push to either main or master branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Adjust this to match your Hostinger PHP version (e.g., 8.1, 8.2, 8.3)
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Deploy to Hostinger via SSH and Rsync
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }} # Highly recommended: use SSH Key instead of password
          password: ${{ secrets.HOSTINGER_PASSWORD }} # Fallback if you prefer password, but key is better
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            # Navigate to the project directory
            cd domains/maroofalbaraka.com/public_html
            
            # Initialize git if it doesn't exist, fetch, and force reset to match GitHub
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/ranaaalihaider/Transport-System.git
            fi
            git fetch --all
            git reset --hard origin/main || git reset --hard origin/master
            
            # Install production dependencies
            composer install --no-dev --optimize-autoloader
            
            # Run database migrations (the --force flag is required in production)
            php artisan migrate --force
            
            # Clear and rebuild caches for optimized performance
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "Deployment completed successfully!"
